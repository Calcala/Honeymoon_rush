<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Honeymoon Rush</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="game-container">

        <!-- HUB SCREEN -->
        <section id="hub" class="screen active">

            <img src="assets/hub_bg.png" alt="Rooftop Bar" class="hub-bg">

            <div class="hub-overlay">
                <!-- Speech Bubble -->
                <div class="speech-bubble" id="hub-dialog">
                    <!-- Text inserted via JS -->
                </div>

                <!-- Door Hitboxes – positioned via JS to match door locations in hub_bg.png -->
                <button class="door-hitbox" id="door-broadway" data-game="broadway" data-img-x1="29" data-img-x2="35"
                    data-img-y1="77" data-img-y2="83" aria-label="Jugar Broadway">
                    <span class="hitbox-glow" style="--glow-color: #d946ef;"></span>
                    <img src="assets/key.png" class="status-icon hidden" alt="Key">
                </button>

                <button class="door-hitbox" id="door-taxi" data-game="taxi" data-img-x1="47" data-img-x2="53"
                    data-img-y1="77" data-img-y2="83" aria-label="Jugar Taxi">
                    <span class="hitbox-glow" style="--glow-color: #fbbf24;"></span>
                    <img src="assets/key.png" class="status-icon hidden" alt="Key">
                </button>

                <button class="door-hitbox" id="door-park" data-game="park" data-img-x1="64" data-img-x2="70"
                    data-img-y1="77" data-img-y2="83" aria-label="Jugar Central Park">
                    <span class="hitbox-glow" style="--glow-color: #4ade80;"></span>
                    <img src="assets/key.png" class="status-icon hidden" alt="Key">
                </button>


            </div>
            <audio id="bgm-hub" src="sounds/hub-bg-music.mp3" loop preload="auto"></audio>
        </section>

        <!-- BROADWAY MINIGAME SCREEN -->
        <section id="broadway" class="screen broadway-screen">
            <!-- Top Half: Background Image with integrated header -->
            <div class="broadway-top">
                <img src="./assets/broadway_bg.png" alt="Broadway Theater" class="broadway-bg">
                <header class="broadway-header">
                    <button class="back-btn" data-target="hub">
                        <svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            style="margin-right:4px; vertical-align:middle; display:inline-block; transform:translateY(-1px);">
                            <line x1="19" y1="12" x2="5" y2="12"></line>
                            <polyline points="12 19 5 12 12 5"></polyline>
                        </svg> Volver
                    </button>
                </header>
            </div>

            <!-- Bottom Half: Game Controls -->
            <div class="broadway-bottom">
                <!-- Animated Marquee Lights -->
                <div class="marquee-lights-bar">
                    <span class="light"></span><span class="light"></span><span class="light"></span>
                    <span class="light"></span><span class="light"></span><span class="light"></span>
                    <span class="light"></span><span class="light"></span><span class="light"></span>
                    <span class="light"></span><span class="light"></span><span class="light"></span>
                </div>

                <div class="broadway-container">
                    <div class="marquee">
                        <div class="marquee-text" id="broadway-message">WATCH!</div>
                        <div class="level-indicator">LEVEL <span id="broadway-level">1</span>/5</div>
                    </div>

                    <div class="button-grid">
                        <button class="game-btn red" data-color="red"></button>
                        <button class="game-btn blue" data-color="blue"></button>
                        <button class="game-btn yellow" data-color="yellow"></button>
                        <button class="game-btn green" data-color="green"></button>
                    </div>
                </div>

                <!-- Audio -->
                <audio id="sfx-button" src="sounds/simon-button-touch.mp3" preload="auto"></audio>
                <audio id="bgm-broadway" src="sounds/simon-bg-music.mp3" loop preload="auto"></audio>
            </div>
        </section>

        <!-- TAXI MINIGAME SCREEN -->
        <section id="taxi" class="screen taxi-screen">
            <canvas id="taxi-canvas" class="taxi-canvas"></canvas>
            <div class="taxi-hud">
                <button class="back-btn taxi-back" data-target="hub">
                    <svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round"
                        style="margin-right:4px; vertical-align:middle; display:inline-block; transform:translateY(-1px);">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg> Volver
                </button>
                <div class="taxi-timer">
                    <span class="timer-label">TIEMPO</span>
                    <span id="taxi-time" class="timer-value">30</span>
                </div>
            </div>
            <div id="taxi-message" class="taxi-message hidden"></div>
            <div id="taxi-countdown" class="taxi-countdown hidden" aria-live="polite"></div>
            <audio id="bgm-taxi" src="sounds/taxi-bg-music.mp3" loop preload="auto"></audio>
        </section>

        <!-- PARK MINIGAME SCREEN -->
        <section id="park" class="screen park-screen">
            <canvas id="park-canvas" class="park-canvas"></canvas>
            <div class="park-hud">
                <button class="back-btn park-back" data-target="hub">
                    <svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round"
                        style="margin-right:4px; vertical-align:middle; display:inline-block; transform:translateY(-1px);">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg> Volver
                </button>
                <div class="park-score">
                    <span class="score-label">OBJETOS</span>
                    <span id="park-score-val" class="score-value">0/10</span>
                </div>
            </div>
            <div id="park-message" class="park-message hidden"></div>
            <div id="park-instructions" class="park-instructions hidden">
                <p>Toque para SALTAR</p>
                <p>Evita ardillas y ciclistas</p>
                <p>Recoge globos y pretzels</p>
            </div>
            <audio id="bgm-park" src="sounds/park-bg-music.mp3" loop preload="auto"></audio>
        </section>

        <!-- FINAL REVEAL SCREEN -->
        <section id="final" class="screen">
            <header class="screen-header">
                <h2 style="display:flex; justify-content:center; align-items:center;">
                    <svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" style="margin-right:8px;">
                        <polygon
                            points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
                        </polygon>
                    </svg>
                    ¡Felicidades!
                </h2>
            </header>
            <main class="final-content">
                <div class="reveal-container">
                    <svg class="envelope-svg" viewBox="0 0 300 250" xmlns="http://www.w3.org/2000/svg">
                        <g transform="translate(0, 50)">
                            <!-- Envelope Back -->
                            <g class="env-fly env-back-layer">
                                <rect class="env-back" x="10" y="50" width="280" height="140" fill="#e2e8f0" rx="10" />
                            </g>

                            <!-- The Card inside -->
                            <g class="env-card">
                                <rect x="30" y="55" width="240" height="130" fill="#ffffff" rx="8" />
                                <!-- Lucide Icon: Gift, converted to fit in the card SVG space -->
                                <g transform="translate(130, 80) scale(1.6)" stroke="#d946ef" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round" fill="none">
                                    <polyline points="20 12 20 22 4 22 4 12"></polyline>
                                    <rect width="20" height="5" x="2" y="7" fill="#fdf4ff"></rect>
                                    <line x1="12" x2="12" y1="22" y2="7"></line>
                                    <path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"></path>
                                    <path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"></path>
                                </g>
                                <text x="150" y="160" text-anchor="middle" font-family="system-ui, sans-serif"
                                    font-weight="bold" font-size="20" fill="#d946ef">¡PREMIO!</text>
                            </g>

                            <!-- Envelope Front and Top Flap -->
                            <g class="env-fly env-front-layer">
                                <!-- Envelope Front (Folded flaps) -->
                                <path class="env-front"
                                    d="M10 50 L150 140 L290 50 L290 180 A10 10 0 0 1 280 190 L20 190 A10 10 0 0 1 10 180 Z"
                                    fill="#cbd5e1" stroke="#94a3b8" stroke-width="1" />

                                <!-- Envelope Top Flap -->
                                <g class="env-flap-wrap" style="transform-origin: 150px 50px;">
                                    <path class="env-flap" d="M10 50 L150 140 L290 50 Z" fill="#f8fafc" stroke="#e2e8f0"
                                        stroke-width="1" />
                                </g>
                            </g>
                        </g>
                    </svg>
                </div>
                <p class="reveal-message">
                    <a style="color: #FFF; text-decoration: none; font-size: 1.2rem;"
                        href="https://www.civitatis.com/es/nueva-york/paseo-helicoptero-manhattan/?srsltid=AfmBOoqN4h9RYhQo49MyXQs4p7DE7btvaPe2vbdymLjj6tM9PDRqe47R">Toca
                        aqui para saber mas</a>
                </p>
            </main>
        </section>

    </div>

    <script src="main.js"></script>
</body>

</html>
